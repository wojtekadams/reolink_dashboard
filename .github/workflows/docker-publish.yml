name: Build & publish Docker image

on:
  # Trigger only when a release is published via the GitHub UI or API.
  # Draft and pre-release events are ignored – the image is built only
  # when you click "Publish release" (or mark a pre-release as full release).
  release:
    types: [published]
  # Allow manual trigger from the Actions tab (useful for a forced rebuild
  # without a code change, e.g. after a base-image security update).
  workflow_dispatch:

env:
  # ghcr.io/<owner>/<repo> – filled in automatically from repository context.
  IMAGE: ghcr.io/${{ github.repository_owner }}/reolink-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to append Docker info to the release notes
      packages: write   # needed to push to ghcr.io

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Resolve SemVer tag ─────────────────────────────────────────────
      # Expected release tag format: 1.0.0  or  v1.0.0 (the leading "v" is
      # stripped so Docker tags are always bare numbers: 1.0.0).
      # Additionally we push a "major.minor" floating tag (e.g. 1.0) so users
      # pinned to "1.0" get patch updates automatically.
      # On a manual workflow_dispatch the step falls back to "dev".
      - name: Resolve SemVer tag
        id: semver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW="${{ github.event.release.tag_name }}"
            FULL="$(echo "$RAW" | sed 's/^v//')"          # strip leading v
            MINOR="$(echo "$FULL" | cut -d. -f1-2)"       # e.g. 1.0
            echo "full=$FULL"   >> "$GITHUB_OUTPUT"
            echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          else
            echo "full=dev"   >> "$GITHUB_OUTPUT"
            echo "minor=dev"  >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Set up QEMU (for multi-arch builds) ────────────────────────────
      # Builds linux/amd64 and linux/arm64 in one shot.
      # Drop arm64 from the platforms line if you only need x86.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 4. Set up Buildx ─────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Log in to ghcr.io ──────────────────────────────────────────────
      # GITHUB_TOKEN is injected automatically – no manual secret needed.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Extract metadata (labels, annotations) ─────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Tags pushed for every release:
          #   1.0.0   – exact version (immutable)
          #   1.0     – floating minor  (moves on every patch)
          #   latest  – always the newest stable release
          #   sha-…   – short commit hash for traceability
          tags: |
            type=raw,value=${{ steps.semver.outputs.full }}
            type=raw,value=${{ steps.semver.outputs.minor }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # ── 7. Build and push ─────────────────────────────────────────────────
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # linux/arm64 covers Raspberry Pi 4/5 and Apple Silicon (via Rosetta).
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the GitHub Actions cache to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 8. Append Docker pull info to the GitHub release notes ────────────
      # Runs only on real release events (not workflow_dispatch).
      # gh release edit appends a Docker section below the existing notes
      # so the original changelog is preserved.
      - name: Append Docker info to release notes
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"   # sha256:abc123…
          SHORT_DIGEST="${DIGEST:7:12}"                # first 12 chars after "sha256:"

          # Build the markdown block that will be appended to the release body.
          DOCKER_SECTION=$(cat << MARKDOWN

          ---

          ### 🐳 Docker image

          | Tag | Pull command |
          |-----|-------------|
          | exact (immutable) | \`docker pull ${{ env.IMAGE }}:${{ steps.semver.outputs.full }}\` |
          | minor (latest patch) | \`docker pull ${{ env.IMAGE }}:${{ steps.semver.outputs.minor }}\` |
          | latest | \`docker pull ${{ env.IMAGE }}:latest\` |
          | digest (pinned) | \`docker pull ${{ env.IMAGE }}@${DIGEST}\` |

          **docker-compose.yml**
          \`\`\`yaml
          services:
            reolink-dashboard:
              image: ${{ env.IMAGE }}:${{ steps.semver.outputs.full }}
          \`\`\`

          > Image digest: \`${DIGEST}\`  
          > Platforms: \`linux/amd64\`, \`linux/arm64\`
          MARKDOWN
          )

          # Fetch the existing release body and append the Docker section.
          CURRENT_BODY="$(gh release view '${{ github.event.release.tag_name }}' --json body -q .body)"
          NEW_BODY="${CURRENT_BODY}${DOCKER_SECTION}"

          gh release edit '${{ github.event.release.tag_name }}' --notes "$NEW_BODY"

      # ── 9. Print image digest to Actions summary ──────────────────────────
      - name: Actions summary
        run: |
          echo "### Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| exact   | \`${{ env.IMAGE }}:${{ steps.semver.outputs.full }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| minor   | \`${{ env.IMAGE }}:${{ steps.semver.outputs.minor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| latest  | \`${{ env.IMAGE }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| digest  | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
